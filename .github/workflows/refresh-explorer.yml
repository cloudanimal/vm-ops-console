name: Refresh Explorer data

on:
  schedule:
    # 05:00 UTC on the 3rd of each month (exploit feeds shift slowly; enrichment is cached)
    - cron: "0 5 3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Explorer dataset
        env:
          VULNCHECK_API_TOKEN: ${{ secrets.VULNCHECK_API_TOKEN }}
        run: python scripts/build_explorer.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exploited.json data/.explorer_cache.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh Explorer data ($(date -u +%Y-%m-%d))"
            # rebase onto any commits that landed during the (long) build, then push — retry to survive races
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed; retrying…"; sleep 5
            done
          fi
