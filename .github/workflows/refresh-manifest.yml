name: Refresh dataset manifest

on:
  schedule:
    # 06:00 UTC daily — after the daily KEV/EPSS refreshes, so the manifest reflects them
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dataset manifest
        run: python scripts/build_manifest.py

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh dataset manifest ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed; retrying…"; sleep 5
            done
          fi
