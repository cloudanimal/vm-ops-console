name: Refresh MSRC patch data

on:
  schedule:
    # 14:00 UTC on the 15th of each month (a few days after Patch Tuesday)
    - cron: "0 14 15 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Build CVE to KB mappings
        run: python scripts/build_msrc.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/msrc
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh MSRC patch data ($(date -u +%Y-%m-%d))"
            git push
          fi
