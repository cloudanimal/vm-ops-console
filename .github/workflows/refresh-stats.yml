name: Refresh CVE statistics

on:
  schedule:
    # 04:00 UTC every Monday; corpus counts move slowly, so weekly is plenty.
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Both builders read the fkie-cad NVD mirror via scripts/nvd_feed.py — no
      # NVD API key needed. They run in this one job so the corpus is downloaded
      # once (build_stats fills the on-disk cache; build_cwe reuses it).
      - name: Build corpus statistics
        run: python scripts/build_stats.py

      - name: Build CWE weakness counts
        run: python scripts/build_cwe.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json data/cwe.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh CVE statistics + CWE counts ($(date -u +%Y-%m-%d))"
            git push
          fi
