name: Refresh Ubuntu data

on:
  schedule:
    # 05:00 UTC on the 4th of each month (after the KEV/Explorer feeds it scopes to)
    - cron: "0 5 4 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Ubuntu fix-status dataset
        run: python scripts/build_ubuntu.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ubuntu data/.ubuntu_cache.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh Ubuntu data ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed; retrying…"; sleep 5
            done
          fi
